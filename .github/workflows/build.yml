name: Build and push MCP image

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    env:
      REGISTRY_NAME: obaisharedregistry
      REGISTRY_LOGIN_SERVER: obaisharedregistry.azurecr.io
      IMAGE_NAME: azure-devops-mcp
      TF_WORKING_DIR: ./devops/Mcp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate build number
        id: build_number
        run: echo "value=${{ github.run_number }}.${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build MCP server
        run: npm run build

      - name: Log in to Azure with service principal
        run: |
          az login --service-principal \
            --username "${{ secrets.ARM_CLIENT_ID }}" \
            --password "${{ secrets.ARM_CLIENT_SECRET }}" \
            --tenant "${{ secrets.ARM_TENANT_ID }}"
          az account set --subscription "${{ secrets.ARM_SUBSCRIPTION_ID }}"

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ env.REGISTRY_NAME }}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.build_number.outputs.value }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Configure Terraform service principal auth
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.ARM_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ secrets.ARM_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.ARM_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.ARM_TENANT_ID }}" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.9.0"

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false -backend-config=config.tfbackend

      - name: Check Terraform formatting
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Validate Terraform config
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: >
          terraform plan -out=tfplan -input=false
          -var="azure_rm_subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}"
          -var="build_number=${{ steps.build_number.outputs.value }}"
          -var="ado_mcp_auth_token=${{ secrets.ADO_MCP_AUTH_TOKEN }}"
          -var="microsoft_auth_client_id=${{ secrets.MICROSOFT_AUTH_CLIENT_ID }}"
          -var="microsoft_auth_tenant_id=${{ secrets.MICROSOFT_AUTH_TENANT_ID }}"

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
